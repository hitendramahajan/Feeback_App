<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org"> 
<head> 
    <title>Submit Feedback</title> 
    <link rel="stylesheet" th:href="@{/css/styles.css}" /> 
</head> 
<body> 
    <div class="container"> 
        <h2>Submit Your Feedback</h2> 
        <form th:action="@{/feedback/new}" th:object="${feedbackForm}" method="post"> 
            <div class="form-group"> 
                <label for="username">Username<span class="required">*</span></label> 
                <input type="text" th:field="*{username}" id="username" class="form-control" /> 
                <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div> 
            </div> 
            <div class="form-group"> 
                <label for="email">Email<span class="required">*</span></label> 
                <input type="email" th:field="*{email}" id="email" class="form-control" /> 
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div> 
            </div> 
            <div class="form-group"> 
                <label for="phone">Phone<span class="required">*</span></label> 
                <input type="text" th:field="*{phone}" id="phone" class="form-control" /> 
                <div class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div> 
            </div> 
            <div class="form-group"> 
                <label for="comments">Comments<span class="required">*</span></label> 
                <textarea th:field="*{comments}" id="comments" class="form-control" rows="4"></textarea> 
                <div class="error" th:if="${#fields.hasErrors('comments')}" th:errors="*{comments}"></div> 
            </div> 
            <div class="form-group"> 
                <label for="starRating">Star Rating<span class="required">*</span></label> 
                <select th:field="*{starRating}" id="starRating" class="form-control" required> 
                    <option th:value="" disabled th:selected="${feedbackForm.starRating == null}">-- Select --</option> 
                    <option th:each="rating : ${T(com.sasva.feedback.model.StarRating).values()}" 
                            th:value="${rating}" th:text="${rating.label}"></option> 
                </select> 
                <div class="error" th:if="${#fields.hasErrors('starRating')}" th:errors="*{starRating}"></div> 
            </div> 
            <button type="submit" class="btn">Submit</button> 
        </form> 
        <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div> 
        <div> 
            <a th:href="@{/}" class="btn-secondary">Back to Home</a> 
            <a th:href="@{/feedback/list}" class="btn-secondary">View Feedback List</a> 
        </div> 
    </div> 
</body> 
</html>
