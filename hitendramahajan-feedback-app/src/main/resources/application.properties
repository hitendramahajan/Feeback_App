# Spring Boot Application Properties 
 
# =============================== 
# = DATA SOURCE CONFIGURATION   = 
# =============================== 
 
spring.datasource.url=jdbc:mysql://localhost:3306/feedback_app?useSSL=false&serverTimezone=UTC # INPUT_REQUIRED {Set your MySQL database URL} 
spring.datasource.username=your_db_username # INPUT_REQUIRED {Set your MySQL database username} 
spring.datasource.password=your_db_password # INPUT_REQUIRED {Set your MySQL database password} 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver 
 
# =============================== 
# = JPA / HIBERNATE             = 
# =============================== 
 
spring.jpa.hibernate.ddl-auto=validate 
spring.jpa.show-sql=true 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect 
 
# =============================== 
# = SERVER CONFIGURATION        = 
# =============================== 
 
server.port=8080 
 
# =============================== 
# = LOGGING                     = 
# =============================== 
 
logging.level.root=INFO 
logging.level.com.sasva.feedback=DEBUG 
logging.file.name=feedback-app.log 
 
# =============================== 
# = FORM VALIDATION             = 
# =============================== 
 
# No explicit properties required for Hibernate Validator (JSR-380) with Spring Boot 
 
# =============================== 
# = OTHER SPRING BOOT SETTINGS  = 
# =============================== 
 
spring.main.banner-mode=console 
spring.mvc.view.prefix=/WEB-INF/views/ 
spring.mvc.view.suffix=.jsp